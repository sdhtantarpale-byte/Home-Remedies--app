
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Home Remedies | घरेलू नुस्खे</title>
<style>
:root {
  --bg: #f8f9fa;
  --card: #ffffff;
  --primary: #2e7d32;
  --primary-light: #4caf50;
  --accent: #ff6f00;
  --text: #212121;
  --muted: #757575;
  --border: #e0e0e0;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --primary: #4caf50;
  --primary-light: #81c784;
  --text: #f5f5f5;
  --muted: #aaaaaa;
  --border: #333333;
  --shadow: 0 2px 8px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  padding-bottom: 80px;
}
/* HEADER */
.header {
  background: var(--primary);
  color: white;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header h1 { font-size: 18px; font-weight: 700; }
.header-icons { display: flex; gap: 14px; }
.icon-btn {
  background: none;
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}
/* SEARCH */
.search-bar {
  padding: 12px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 54px;
  z-index: 99;
}
.search-input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.search-wrap { position: relative; }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--muted);
}
/* CATEGORIES */
.cat-scroll {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.cat-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
/* CARDS */
.remedies-grid {
  padding: 12px 16px;
  display: grid;
  gap: 12px;
}
.remedy-card {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.2s;
}
.remedy-card:active { transform: scale(0.98); }
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.card-title { font-size: 16px; font-weight: 700; flex: 1; }
.card-title .hindi { font-size: 13px; color: var(--muted); display: block; margin-top: 2px; }
.bookmark-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--muted);
  padding: 0 0 0 8px;
  flex-shrink: 0;
}
.bookmark-btn.saved { color: var(--accent); }
.card-cat {
  display: inline-block;
  margin-top: 8px;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(46,125,50,0.1);
  color: var(--primary);
  font-weight: 600;
}
.card-preview {
  font-size: 13px;
  color: var(--muted);
  margin-top: 8px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
/* DETAIL MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 40px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title { font-size: 20px; font-weight: 800; }
.modal-title .hindi { font-size: 15px; color: var(--muted); font-weight: 400; }
.modal-cat {
  display: inline-block;
  margin: 8px 0 14px;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 12px;
  background: rgba(46,125,50,0.1);
  color: var(--primary);
  font-weight: 600;
}
.section-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin: 14px 0 6px;
}
.ingredients-list {
  list-style: none;
  display: grid;
  gap: 6px;
}
.ingredients-list li {
  display: flex;
  gap: 8px;
  font-size: 14px;
  align-items: flex-start;
}
.ingredients-list li::before {
  content: '🌿';
  flex-shrink: 0;
}
.steps-list {
  list-style: none;
  display: grid;
  gap: 10px;
}
.steps-list li {
  display: flex;
  gap: 10px;
  font-size: 14px;
  align-items: flex-start;
  line-height: 1.5;
}
.step-num {
  background: var(--primary);
  color: white;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}
.warning-box {
  background: rgba(255,111,0,0.1);
  border: 1px solid rgba(255,111,0,0.3);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--accent);
  margin-top: 14px;
}
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-outline {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
}
.close-btn {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--bg);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal { position: relative; }
/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  transition: color 0.2s;
}
.nav-item.active { color: var(--primary); }
.nav-item .nav-icon { font-size: 22px; margin-bottom: 2px; }
/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; }
/* PDF TOAST */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>
</head>
